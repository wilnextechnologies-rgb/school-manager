{% extends "base.html" %}
{% block extra_head %}
<style>
body {
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 50%, #002171 100%);
    min-height: 100vh;
}
.card { background: rgba(255,255,255,0.95); }
</style>
{% endblock %}
{% block title %}- Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5"><div class="col-md-5">
<div class="card shadow"><div class="card-header bg-primary text-white text-center"><h4><i class="bi bi-mortarboard-fill"></i> School Manager</h4><p class="mb-0">Sign in</p></div>
<div class="card-body p-4">
<form method="POST">
<div class="mb-3"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required></div>
<div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
<button type="submit" class="btn btn-primary w-100">Sign In</button>
</form>
<p class="mt-3 text-center">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
<p class="mt-2 text-center"><a href="{{ url_for('student_login') }}">Student Portal</a></p>
</div></div></div></div>
<div class="text-center mt-4 text-muted" style="font-size:0.8em;color:#fff!important;">
    System developed by <strong>Wilnex Computers Technologies</strong> &nbsp; Contact: <strong>0728052298</strong>
</div>
{% endblock %}
