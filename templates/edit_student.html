{% extends "base.html" %}
{% block title %}- Edit Student{% endblock %}
{% block content %}
<h2><i class="bi bi-pencil"></i> Edit Student</h2>
<hr>

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-warning">Edit Student: {{ student.full_name }}</div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-2">
                        <label class="form-label">Admission Number *</label>
                        <input type="text" name="admission_number" class="form-control" value="{{ student.admission_number }}" required>
                    </div>
                    <div class="row mb-2">
                        <div class="col">
                            <label class="form-label">First Name *</label>
                            <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
                        </div>
                        <div class="col">
                            <label class="form-label">Last Name *</label>
                            <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Class *</label>
                        <select name="class_id" class="form-select" required>
                            {% for c in classes %}
                            <option value="{{ c.id }}" {% if c.id == student.class_id %}selected{% endif %}>{{ c.name }} {{ c.section or '' }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row mb-2">
                        <div class="col">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">Select</option>
                                <option value="Male" {% if student.gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if student.gender == 'Female' %}selected{% endif %}>Female</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth or '' }}">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ student.email or '' }}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" value="{{ student.phone or '' }}">
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2">{{ student.address or '' }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Update Student</button>
                    <a href="{{ url_for('students') }}" class="btn btn-secondary w-100 mt-1">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
