{% extends "base.html" %}{% block title %}- Edit Subject{% endblock %}{% block content %}
<h2>Edit Subject</h2><hr>
<div class="row"><div class="col-md-6 mx-auto">
<div class="card"><div class="card-header bg-warning">Edit Subject</div>
<div class="card-body">
<form method="POST">
<div class="mb-2"><label>Subject Name *</label><input type="text" name="name" class="form-control" value="{{ subject.name }}" required></div>
<div class="mb-2"><label>Teacher Name</label><input type="text" name="teacher" class="form-control" value="{{ subject.teacher or '' }}" placeholder="e.g. Mr. John"></div>
<button type="submit" class="btn btn-warning w-100">Update</button>
<a href="{{ url_for('subjects') }}" class="btn btn-secondary w-100 mt-1">Cancel</a>
</form></div></div></div></div>
{% endblock %}
