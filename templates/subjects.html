{% extends "base.html" %}{% block title %}- Subjects{% endblock %}{% block content %}
<div class="row">
<div class="col-md-5">
<div class="card"><div class="card-header bg-secondary text-white">Add Subject</div>
<div class="card-body">
<form method="POST">
<div class="mb-2"><label>Subject Name *</label><input type="text" name="name" class="form-control" required></div>
<button type="submit" class="btn btn-secondary w-100">Add Subject</button>
</form></div></div></div>
<div class="col-md-7">
<div class="card"><div class="card-header bg-dark text-white">Subjects</div>
<div class="card-body">
<table class="table"><thead><tr><th>Subject</th><th>Action</th></tr></thead>
<tbody>
{% for sub in subjects %}
<tr>
<td>{{ sub.name }}</td>
<td>
<a href="{{ url_for('edit_subject', id=sub.id) }}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
<a href="{{ url_for('delete_subject', id=sub.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this subject? All marks for this subject will also be deleted.')"><i class="bi bi-trash"></i></a>
</td>
</tr>
{% else %}
<tr><td colspan="2" class="text-center">No subjects.</td></tr>
{% endfor %}
</tbody></table>
</div></div></div></div>
{% endblock %}
